<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Purple Dashboard icon">
  <defs>
    <linearGradient id="gMain" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>

    <linearGradient id="gPaper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#f6eefc" stop-opacity="0.98"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset dx="0" dy="10" result="o"/>
      <feGaussianBlur in="o" stdDeviation="18" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="0 0 0 0 0.62  0 0 0 0 0.36  0 0 0 0 0.78  0 0 0 0.16 0" />
      <feBlend in="SourceGraphic" in2="b"/>
    </filter>

    <radialGradient id="tickGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f8ecff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#e5c8ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d6a8ff" stop-opacity="0"/>
    </radialGradient>

    <g id="spark">
      <path d="M6 0 L8 4 L12 6 L8 8 L6 12 L4 8 L0 6 L4 4 Z" fill="#F7E8FF" opacity="0.9"/>
    </g>
  </defs>

  <!-- soft background -->
  <rect width="100%" height="100%" rx="72" ry="72" fill="#f3e8ff"/>

  <!-- glowing rounded card (journal) -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="384" height="400" rx="36" ry="36" fill="url(#gMain)" opacity="0.12"/>
    <rect x="8" y="8" width="368" height="384" rx="32" ry="32" fill="url(#gPaper)" filter="url(#dropShadow)"/>
    <!-- left spine accent -->
    <rect x="8" y="28" width="18" height="356" rx="9" ry="9" fill="url(#gMain)" opacity="0.08"/>

    <!-- list lines -->
    <g fill="#EAD9FF" opacity="0.38">
      <rect x="74" y="72" width="230" height="8" rx="4"/>
      <rect x="74" y="116" width="230" height="8" rx="4"/>
      <rect x="74" y="160" width="230" height="8" rx="4"/>
      <rect x="74" y="204" width="150" height="8" rx="4"/>
    </g>

    <!-- check circles -->
    <g transform="translate(40,64)">
      <rect x="0" y="0" width="48" height="48" rx="12" ry="12" fill="white" opacity="0.9"/>
      <rect x="4" y="4" width="40" height="40" rx="10" ry="10" fill="#efebff" />
    </g>
    <g transform="translate(40,108)">
      <rect x="0" y="0" width="48" height="48" rx="12" ry="12" fill="white" opacity="0.9"/>
      <rect x="4" y="4" width="40" height="40" rx="10" ry="10" fill="#efebff" />
    </g>
    <g transform="translate(40,152)">
      <rect x="0" y="0" width="48" height="48" rx="12" ry="12" fill="white" opacity="0.9"/>
      <rect x="4" y="4" width="40" height="40" rx="10" ry="10" fill="#efebff" />
    </g>

    <!-- glowing tick badge (primary visual) -->
    <g transform="translate(246,188)">
      <circle cx="40" cy="40" r="42" fill="url(#tickGlow)" />
      <circle cx="40" cy="40" r="30" fill="url(#gMain)" filter="url(#softGlow)"/>
      <path d="M28 40 L36 48 L56 28" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="40" cy="40" r="30" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    </g>

    <!-- small sparkles -->
    <g transform="translate(320,32)" opacity="0.95">
      <use href="#spark" transform="translate(-6,-6) scale(1.6)" opacity="0.95" />
    </g>
    <g transform="translate(288,340)" opacity="0.95">
      <use href="#spark" transform="translate(-6,-6) scale(1.2)" opacity="0.85" />
    </g>
    <g transform="translate(56,32)" opacity="0.95">
      <use href="#spark" transform="translate(-6,-6) scale(1.0)" opacity="0.9" />
    </g>
    <g transform="translate(200,12)" opacity="0.9">
      <use href="#spark" transform="translate(-6,-6) scale(0.85)" opacity="0.75" />
    </g>

    <!-- subtle top shine -->
    <path d="M18 12 C96 -6, 296 -6, 366 12" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.4" stroke-linecap="round" opacity="0.16"/>
  </g>
</svg>
